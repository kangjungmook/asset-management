server:
  port: 8080

spring:
  config:
    import: optional:classpath:application-secrets.yml
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/ams_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.mariadb.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:please-override-this-secret-with-a-real-256bit-value}
  access-expiration: 900000
  refresh-expiration: 604800000

logging:
  level:
    com.company.ams: debug
